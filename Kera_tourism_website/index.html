<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kerala Tourism | Official Experience</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

    <style>
        :root {
            --primary: #006141;
            --accent: #F9A825;
            --bg-light: #f5f8f7;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-light);
            color: #101816;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.9) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #f0f5f3;
            padding: 1rem 0;
        }
        .nav-link {
            font-size: 0.875rem;
            font-weight: 500;
            color: #101816 !important;
            margin: 0 15px;
        }
        .nav-link:hover { color: var(--primary) !important; }

        .dropdown-menu {
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 15px;
            padding: 0.5rem;
            background: white;
        }
        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            padding: 0.7rem 1.2rem;
            border-radius: 10px;
            color: #101816;
        }
        .dropdown-item:hover {
            background-color: var(--bg-light);
            color: var(--primary);
        }

        .hero {
            height: 85vh;
            min-height: 600px;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1602216056096-3b40cc0c9944?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            color: white;
        }

        .search-box {
            background: white;
            border-radius: 20px;
            padding: 1rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-top: -50px;
            position: relative;
            z-index: 10;
        }

        .dest-card {
            position: relative;
            border-radius: 1.5rem;
            overflow: hidden;
            aspect-ratio: 3/4;
            border: none;
            cursor: pointer;
        }
        .dest-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 1.5rem;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            color: white;
        }

        .btn-primary-kerala {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 24px;
            font-weight: 700;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="#">Kerala Tourism</a>

            <!-- ✅ ADDED ONLY THIS -->
            <div class="ms-auto">
                <span class="fw-bold text-dark">Ritesh Bavi</span>
            </div>

        </div>
    </nav>

    <header class="hero text-center">
        <div class="container">
            <h1 class="display-2 fw-bold mb-3">God's Own Country Awaits.</h1>
            <p class="fs-4 mb-5">Experience the serenity of nature in its purest form.</p>
        </div>
    </header>

    <main class="container my-5">
        <h2 class="fw-bold">Popular Destinations</h2>
        <p class="text-muted">Curated locations for your perfect getaway.</p>
    </main>

    <!-- ✅ FOOTER (UNCHANGED) -->
    <footer class="bg-dark text-white py-5 mt-5">
        <div class="container text-center">
            <h3 class="fw-bold">Kerala Tourism</h3>
            <p class="text-secondary small">
                © 2023 Department of Tourism, Government of Kerala. All rights reserved.<br>
                Designed by <strong>Ritesh Bavi</strong>
            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
